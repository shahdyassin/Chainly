<section id="contact" class="cta-section py-5">
  <div class="container">

    <div class="text-center mb-5">
      <p class="section-label">Contact Us</p>
      <h2 class="cta-heading">
        Reach out to our team to learn more about Chainly,<br />
        request a demo, or discuss partnerships
      </h2>
    </div>

    <div class="row align-items-center">
      <div class="col-lg-6">
  <div class="cta-visual">
     <h3 class="cta-title">
            Let's Build a Smarter<br />
            Supply<br />
            Chain<br />
            Together
          </h3>
    <img
      src="/images/contact-us/Mockup-Left.png"
      alt="Chainly dashboard mockup"
      class="cta-mockup"
    />
  </div>
</div>
      <div class="col-lg-6">
        <div class="cta-form-container">
          <form class="cta-form">
            <div class="form-group">
              <input type="text" class="form-control field-1" placeholder="Name" required />
            </div>
            <div class="form-group">
              <input type="email" class="form-control field-2" placeholder="Email" required />
            </div>
            <div class="form-group">
              <input type="text" class="form-control field-3" placeholder="Company (optional)" />
            </div>
            <div class="form-group">
              <textarea class="form-control field-4" placeholder="Message" rows="6" required></textarea>
            </div>
            <button type="submit" class="btn btn-teal btn-block w-100">
              Get In Touch
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
