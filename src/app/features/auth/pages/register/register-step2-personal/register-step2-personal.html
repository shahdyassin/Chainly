<div class="login-page">
  <div class="login-card">


    <div class="login-left">
      <div class="image-wrapper">
        <img src="/images/Login/Left-Side.png" alt="Chainly" class="login-image" />
        <div class="login-left-text">
          <h2>Getting Started</h2>
          <p>Your supply chain, synced in real time—from sourcing to delivery</p>
        </div>
      </div>
    </div>


    <div class="login-right">
      <div class="right-inner">


        <div class="stepper">
          <div class="step completed">
            <div class="step-icon">
              <img src="/icons/register/check.svg" alt="Done" />
            </div>
            <p class="step-number">Step 1</p>
            <p class="step-label">Your Role</p>
          </div>

          <div class="step-line completed"></div>

          <div class="step active">
            <div class="step-icon">
              <img src="/icons/register/person.svg" alt="Personal Information" />
            </div>
            <p class="step-number">Step 2</p>
            <p class="step-label">Personal Information</p>
          </div>

          <div class="step-line active"></div>

          <div class="step">
            <div class="step-icon">
              <img src="/icons/register/password.svg" alt="Password" />
            </div>
            <p class="step-number">Step 3</p>
            <p class="step-label">Password</p>
          </div>

          <div class="step-line"></div>

          <div class="step">
            <div class="step-icon">
              <img src="/icons/register/email.svg" alt="Email Confirmation" />
            </div>
            <p class="step-number">Step 4</p>
            <p class="step-label">Email Confirmation</p>
          </div>
        </div>


        <form [formGroup]="personalForm" (ngSubmit)="onSubmit()" class="form">

          <div class="form-group">
            <label>Email</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <img src="/icons/register/email.svg" alt="" />
              </span>
              <input type="email" placeholder="Email" formControlName="email" />
            </div>
          </div>


          <div class="form-group">
            <label>Full Name</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <img src="/icons/register/person.svg" alt="" />
              </span>
              <input type="text" placeholder="Full Name" formControlName="fullName" />
            </div>
          </div>


          <div class="form-group">
            <label>Company Name</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <img src="/icons/register/company.svg" alt="" />
              </span>
              <input type="text" placeholder="Company Name" formControlName="companyName" />
            </div>
          </div>


          <div class="form-group">
            <label>Company Location</label>

            <button type="button" class="location-btn" [ngClass]="{ 'location-selected': selectedLocation }"
              (click)="openLocationPicker()">

              <span class="location-icon">
                <img src="/icons/register/location.svg" alt="" />
              </span>

              <span class="location-label">
                {{ selectedLocation || "Add Company's Location" }}
              </span>
            </button>

          </div>

          <div class="bottom-actions">
            <button type="button" class="btn-secondary" (click)="back()">
              Back
            </button>

            <button type="submit" class="btn-primary" [disabled]="personalForm.invalid">
              Next
            </button>
          </div>

        </form>

      </div>
    </div>

  </div>


  <div class="map-backdrop" *ngIf="showMap">
    <div class="map-dialog">
      <h3>Select Company Location</h3>


      <app-map-picker (locationSelected)="onLocationSelected($event)">
      </app-map-picker>

      <div class="map-actions">
        <button type="button" class="btn-secondary" (click)="cancelLocation()">
          Cancel
        </button>
        <button type="button" class="btn-primary" [disabled]="!tempLocation" (click)="confirmLocation()">
          Use this location
        </button>
      </div>
    </div>
  </div>

</div>
