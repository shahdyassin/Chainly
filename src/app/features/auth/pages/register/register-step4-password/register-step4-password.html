<div class="login-page">
  <div class="login-card">


    <div class="login-left">
      <div class="image-wrapper">
        <img src="/images/Login/Left-Side.png" alt="Chainly" class="login-image" />
        <div class="login-left-text">
          <h2>Getting Started</h2>
          <p>Your supply chain, synced in real time—from sourcing to delivery</p>
        </div>
      </div>
    </div>


    <div class="login-right">
      <div class="right-inner">


        <div class="stepper">
          <div class="step completed">
            <div class="step-icon">
              <img src="/icons/register/check.svg" alt="Done" />
            </div>
            <p class="step-number">Step 1</p>
            <p class="step-label">Your Role</p>
          </div>

          <div class="step-line completed"></div>

          <div class="step completed">
            <div class="step-icon">
              <img src="/icons/register/check.svg" alt="Personal Information" />
            </div>
            <p class="step-number">Step 2</p>
            <p class="step-label">Personal Information</p>
          </div>

          <div class="step-line"></div>

          <div class="step active">
            <div class="step-icon">
              <img src="/icons/register/password.svg" alt="Password" />
            </div>
            <p class="step-number">Step 3</p>
            <p class="step-label">Password</p>
          </div>

          <div class="step-line"></div>

          <div class="step">
            <div class="step-icon">
              <img src="/icons/register/email.svg" alt="Email Confirmation" />
            </div>
            <p class="step-number">Step 4</p>
            <p class="step-label">Email Confirmation</p>
          </div>
        </div>


        <form [formGroup]="passwordForm" (ngSubmit)="next()" class="password-form">


          <div class="form-group">
            <label>Password</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <img src="/icons/register/password.svg" alt="" />
              </span>

              <input [type]="showPassword ? 'text' : 'password'" placeholder="Password" formControlName="password" />

              <img [src]="showPassword ? '/icons/login/eye-slash-closed-full.svg' : '/icons/login/eye.svg'"
                class="eye-icon" (click)="togglePassword()" alt="toggle visibility" />
            </div>
          </div>


          <div class="form-group">
            <label>Confirm Password</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <img src="/icons/register/password.svg" alt="" />
              </span>

              <input [type]="showConfirmPassword ? 'text' : 'password'" placeholder="Confirm Password"
                formControlName="confirmPassword" />

              <img [src]="showConfirmPassword ? '/icons/login/eye-slash-closed-full.svg' : '/icons/login/eye.svg'"
                class="eye-icon" (click)="toggleConfirmPassword()" alt="toggle visibility" />
            </div>
          </div>



          <ul class="password-hints">
            <li>At least 6 characters</li>
            <li>Should include numbers &amp; special characters</li>
          </ul>


          <div class="backend-error" *ngIf="backendError">
            {{ backendError }}
          </div>


          <div class="bottom-actions">
            <button type="button" class="btn-secondary" (click)="back()">
              Back
            </button>

            <button type="submit" class="btn-primary" [disabled]="passwordForm.invalid || loading">
              {{ loading ? 'Loading...' : 'Next' }}
            </button>
          </div>

        </form>

      </div>
    </div>
  </div>
</div>
