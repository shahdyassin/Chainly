<div class="login-page">
  <div class="login-card">


    <div class="login-left">
      <div class="image-wrapper">
        <img src="/images/Login/Left-Side.png" alt="Chainly" class="login-image" />
        <div class="login-left-text">
          <h2>
            Optimize.<br />
            Track.<br />
            Strengthen.
          </h2>
          <p>Your supply chain, synced in real time—from sourcing to delivery</p>
        </div>
      </div>
    </div>


    <div class="login-right">
      <div class="right-inner">

        <h1>Reset Password</h1>
        <p class="subtitle">Update your password</p>

        <form [formGroup]="form" (ngSubmit)="onSubmit()">


          <div class="field">
            <label>Password</label>
            <div class="input-wrapper" [class.error]="password.invalid && password.touched">
              <img src="/icons/login/lock.svg" alt="" class="input-icon" />
              <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="Password" />
              <img [src]="showPassword ? '/icons/login/eye-slash-closed-full.svg' : '/icons/login/eye.svg'" alt=""
                class="eye-icon" (click)="togglePasswordVisibility('password')" />
            </div>
          </div>


          <div class="field">
            <label>Confirm Password</label>
            <div class="input-wrapper"
              [class.error]="(confirmPassword.invalid && confirmPassword.touched) || form.hasError('mismatch')">
              <img src="/icons/login/lock.svg" alt="" class="input-icon" />
              <input [type]="showConfirmPassword ? 'text' : 'password'" formControlName="confirmPassword"
                placeholder="Confirm Password" />
              <img [src]="showConfirmPassword ? '/icons/login/eye-slash-closed-full.svg' : '/icons/login/eye.svg'"
                alt="" class="eye-icon" (click)="togglePasswordVisibility('confirm')" />
            </div>
          </div>



          <div class="backend-error" *ngIf="errorMessage">
            {{ errorMessage }}
          </div>
          <div class="backend-success" *ngIf="successMessage">
            {{ successMessage }}
          </div>


          <button class="btn-primary" type="submit" [disabled]="loading">
            {{ loading ? 'Saving...' : 'Done' }}
          </button>
        </form>


        <div class="back-wrapper">
          <button type="button" class="btn-back" (click)="goBack()">
            Back
          </button>
        </div>

      </div>
    </div>
  </div>
</div>
