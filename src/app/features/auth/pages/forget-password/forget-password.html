<div class="login-page">
  <div class="login-card">

    <div class="login-left">
      <div class="image-wrapper">
        <img src="/images/Login/Left-Side.png" alt="Chainly" class="login-image" />
        <div class="login-left-text">
          <h2>
            Optimize.<br />
            Track.<br />
            Strengthen.
          </h2>
          <p>Your supply chain, synced in real time—from sourcing to delivery</p>
        </div>
      </div>
    </div>


    <div class="login-right">
      <div class="right-inner">
        <h1>Forget Password</h1>
        <p class="subtitle">Please enter your email to send reset code</p>

        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <div class="field">
            <label>Email</label>
            <div class="input-wrapper" [class.error]="email.invalid && email.touched">
              <img src="/icons/login/email.svg" alt="" class="input-icon" />
              <input type="email" formControlName="email" placeholder="Email" />
            </div>
            <div class="error-text" *ngIf="email.invalid && email.touched">
              Please enter a valid email.
            </div>
          </div>


          <div class="backend-error" *ngIf="errorMessage">
            {{ errorMessage }}
          </div>
          <div class="backend-success" *ngIf="successMessage">
            {{ successMessage }}
          </div>

          <button class="btn-primary" type="submit" [disabled]="loading">
            {{ loading ? 'Sending...' : 'Continue' }}
          </button>
        </form>

        <div class="back-wrapper">
          <button type="button" class="btn-back" (click)="goBack()">
            Back
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
