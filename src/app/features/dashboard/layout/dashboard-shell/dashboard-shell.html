<div class="shell" [class.sidebar-collapsed]="isSidebarCollapsed">
  <aside class="sidebar">
    <div class="logo-row">
      <div class="logo">
        <img class="logo-mark" src="/images/logo.svg" alt="Chainly mark" />
        <img class="logo-word" src="/images/name.svg" alt="Chainly" />
      </div>

      <button class="logo-mini-btn" (click)="toggleSidebar()">
        <img src="/icons/dashboard/sidebar.svg" alt="Toggle sidebar" />
      </button>
    </div>


    <nav class="nav">
      <div class="nav-group">
        <p class="group-title">Main</p>

        <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
          class="nav-item">
          <img src="/icons/dashboard/home.svg" alt="" />
          <span>Dashboard</span>
        </a>

        <a routerLink="/dashboard/insights-list" routerLinkActive="active" class="nav-item">
          <img src="/icons/dashboard/insights.svg" alt="" />
          <span>Insights</span>
        </a>
      </div>

      <div class="nav-group">
        <p class="group-title">Operations</p>

        <a routerLink="/dashboard/rising-demands" routerLinkActive="active" class="nav-item">
          <img src="/icons/dashboard/increase.svg" alt="" />
          <span>Rising Demands</span>
        </a>

        <a routerLink="/dashboard/production-lines" routerLinkActive="active" class="nav-item">
          <img src="/icons/dashboard/factory.svg" alt="" />
          <span>Production Lines</span>
        </a>

        <a routerLink="/dashboard/orders" routerLinkActive="active" class="nav-item">
          <img src="/icons/dashboard/order.svg" alt="" />
          <span>Orders</span>
        </a>

        <a routerLink="/dashboard/digital-twin" routerLinkActive="active" class="nav-item">
          <img src="/icons/dashboard/twin.svg" alt="" />
          <span>Digital Twin</span>
        </a>
      </div>

      <div class="nav-group">
        <p class="group-title">Suppliers Network</p>

        <a routerLink="/dashboard/suppliers" routerLinkActive="active" class="nav-item">
          <img src="/icons/dashboard/suppliers.svg" alt="" />
          <span>Suppliers</span>
        </a>

        <a routerLink="/dashboard/supplies-list" routerLinkActive="active" class="nav-item">
          <img src="/icons/dashboard/truck.svg" alt="" />
          <span>Supplies</span>
        </a>
      </div>

      <div class="nav-group">
        <p class="group-title">Management</p>

        <a routerLink="/dashboard/users-list" routerLinkActive="active" class="nav-item">
          <img src="/icons/dashboard/users.svg" alt="" />
          <span>Users</span>
        </a>
      </div>
    </nav>

    <div class="user-card">
      <div class="avatar">
        <img [src]="userAvatarUrl" alt="User" />
      </div>
      <div class="user-text">
        <p class="name">{{ userName }}</p>
        <p class="role">{{ userRole }}</p>
      </div>
      <button class="more-btn">⋮</button>
    </div>
  </aside>

  <div class="sidebar-backdrop" [class.visible]="isSidebarCollapsed" (click)="toggleSidebar()"></div>

  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" (click)="toggleSidebar()">
          <img src="/icons/dashboard/sidebar.svg" alt="Toggle sidebar" />
        </button>


        <span class="topbar-title">
          <ng-container *ngFor="let c of breadcrumbs; let i = index; let last = last">
            <a *ngIf="c.link" class="crumb link" [routerLink]="c.link">{{ c.label }}</a>
            <span *ngIf="!c.link" class="crumb">
              {{ splitLabel(c.label).word }}
              <span class="num">{{ splitLabel(c.label).number }}</span>
            </span>
            <span *ngIf="!last" class="sep">/</span>
          </ng-container>
        </span>



      </div>

      <div class="topbar-right">
        <div class="search-wrapper">
          <img src="/icons/dashboard/search.svg" alt="" />
          <input type="text" placeholder="Search anything.." />
        </div>

        <button class="icon-btn">
          <img src="/icons/dashboard/notification.svg" alt="Notifications" />
        </button>
        <button class="icon-btn">
          <img src="/icons/dashboard/bot.svg" alt="AI" />
        </button>
      </div>
    </header>

    <main class="content">

      <router-outlet></router-outlet>
    </main>
  </div>
</div>
